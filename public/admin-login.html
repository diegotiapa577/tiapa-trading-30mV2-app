<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔐 Inicio de Sesión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .login-container {
      background: #1e293b;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #60a5fa;
      font-size: 1.5rem;
    }
    .input-group {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 0.875rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .error {
      color: #f87171;
      margin-top: 0.75rem;
      text-align: center;
      min-height: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>🔐 Inicio de Sesión</h2>
    
    <div class="input-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="Ej: admin" autocomplete="off" />
    </div>
    
    <div class="input-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Tu contraseña" autocomplete="off" />
    </div>
    
    <button id="login-btn" onclick="login()">Iniciar Sesión</button>
    <div id="message" class="error"></div>
  </div>

  <script>
    // Redirigir si ya hay token
    if (localStorage.getItem('authToken')) {
      window.location.href = '/admin-panel.html';
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('message');
      const btn = document.getElementById('login-btn');

      if (!username || !password) {
        msg.textContent = 'Por favor ingresa usuario y contraseña';
        return;
      }

      btn.disabled = true;
      msg.textContent = '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
         localStorage.removeItem('authToken'); // ← Asegura que no queden tokens antiguos
         localStorage.setItem('authToken', data.token);

          localStorage.setItem('authToken', data.token);
          window.location.href = '/admin-panel.html';
        } else {
          msg.textContent = data.error || 'Error al iniciar sesión';
        }
      } catch (err) {
        msg.textContent = 'No se pudo conectar al servidor';
        console.error(err);
      } finally {
        btn.disabled = false;
      }

      // En user-login.html y admin-login.html

    }
  
    // Soporte para Enter
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

   
  </script>
</body>
</html>

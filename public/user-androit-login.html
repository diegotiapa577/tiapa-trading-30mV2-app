<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔐 Acceso Usuario - TIAPA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .login-container {
      background: #1e293b;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #60a5fa;
      font-size: 1.4rem;
    }
    .input-group {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.9em;
      color: #cbd5e1;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    button {
      width: 100%;
      padding: 0.875rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #2563eb;
    }
    button:disabled {
      background: #64748b;
      cursor: not-allowed;
    }
    .error {
      color: #f87171;
      margin-top: 0.75rem;
      text-align: center;
      min-height: 1.25rem;
      font-size: 0.875rem;
    }
    .info-box {
      background: #1e2a3a;
      border-left: 3px solid #3b82f6;
      padding: 0.75rem;
      margin: 1rem 0;
      font-size: 0.85rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>



  <div class="login-container">
    <h2>🔐 Acceso de Usuario</h2>
    
    <div class="info-box">
      Ingrese su código de acceso y credenciales de Binance Testnet
    </div>

    <div class="input-group">
      <label for="code">Código de Acceso</label>
      <input type="text" id="code" placeholder="Ej: TIAPA_USER_001" autocomplete="off" />
    </div>

    <div class="input-group">
      <label for="apiKey">API Key (Testnet)</label>
      <input type="password" id="apiKey" placeholder="••••••••••••••••" />
    </div>

    <div class="input-group">
      <label for="apiSecret">API Secret (Testnet)</label>
      <input type="password" id="apiSecret" placeholder="••••••••••••••••" />
    </div>

    <button id="login-btn" onclick="loginUser()">Iniciar Sesión</button>
    <div id="message" class="error"></div>
  </div>

  <script>
    // Redirigir si ya hay token
    if (localStorage.getItem('authToken')) {
      window.location.href = '/admin-panel.html';
    }

    async function loginUser() {
      const code = document.getElementById('code').value.trim();
      const apiKey = document.getElementById('apiKey').value;
      const apiSecret = document.getElementById('apiSecret').value;
      const msg = document.getElementById('message');
      const btn = document.getElementById('login-btn');

      if (!code || !apiKey || !apiSecret) {
        msg.textContent = 'Por favor complete todos los campos';
        return;
      }

      btn.disabled = true;
      msg.textContent = '';

      try {
        const res = await fetch('/api/user/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, apiKey, apiSecret })
        });

        const data = await res.json();

        if (data.success) {
             localStorage.removeItem('authToken'); // ← Asegura que no queden tokens antiguos
             localStorage.setItem('authToken', data.token);
          window.location.href = '/android-panel.html';// ✅ Redirección correcta

        } else {
          msg.textContent = data.error || 'Error al iniciar sesión';
        }
      } catch (err) {
        console.error('Error de conexión:', err);
        msg.textContent = '⚠️ No se pudo conectar al servidor';
      } finally {
        btn.disabled = false;
      }

  // En user-login.html y admin-login.html


    }

    // Soporte para Enter
    document.getElementById('apiSecret').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginUser();
    });

    localStorage.removeItem('authToken'); // ← Asegura que no queden tokens antiguos

  </script>
</body>
</html>
